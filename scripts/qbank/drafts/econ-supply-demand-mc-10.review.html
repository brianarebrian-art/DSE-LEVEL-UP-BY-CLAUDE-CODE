const DATA = [{"id":"econ-sd-mc-0","topic":"需求變動 vs 需求量變動","difficulty":"basic","question":"下列哪一項變動會令香港樽裝檸檬茶的需求增加？","options":["其替代品（如樽裝烏龍茶）的價格上升","樽裝檸檬茶的價格下跌","製造商引入自動化生產線，降低生產成本","政府向樽裝檸檬茶的賣方徵收從量稅"],"correctIndex":0,"explanation":"替代品價格上升，消費者轉而購買相對便宜的檸檬茶，需求曲線右移，屬需求增加。「樽裝檸檬茶的價格下跌」只會令需求量沿原有需求曲線增加，需求本身（整條曲線）不變——「需求」與「需求量」的區分正是本題考核重點。「引入自動化生產線」與「向賣方徵收從量稅」均作用於供應一方：前者令供應增加，後者令供應減少，兩者都不會移動需求曲線。","trapTypes":["correct","concept_swap","irrelevant","irrelevant"],"dnaTag":"CMT","mother":"sd-demand-shift"},{"id":"econ-sd-mc-1","topic":"供應變動 vs 供應量變動","difficulty":"basic","question":"下列哪一項變動會令市場上菠蘿包的供應減少？","options":["麵粉價格上升","菠蘿包的市價下跌","消費者偏好轉向較健康的包點","新式焗爐令每批次產量倍增"],"correctIndex":0,"explanation":"麵粉是生產菠蘿包的生產要素，其價格上升令每一產量水平的生產成本增加，供應曲線左移，供應減少。「菠蘿包的市價下跌」令供應量沿原有供應曲線減少，並非供應（整條曲線）減少。「消費者偏好轉向較健康的包點」影響的是需求一方，令需求減少，與供應無關。「新式焗爐令每批次產量倍增」屬技術進步，效果方向剛好相反——供應會增加而非減少。","trapTypes":["correct","concept_swap","irrelevant","concept_reversal"],"dnaTag":"CMT","mother":"sd-supply-shift"},{"id":"econ-sd-mc-2","topic":"市場均衡與短缺","difficulty":"basic","question":"某街市雞蛋的每日需求及供應如下——價格（\\$/打）：10、12、14、16；需求量（打）：500、440、380、320；供應量（打）：260、320、380、440。若現時市價為每打 \\$12，下列哪一項正確描述市場情況？","options":["出現 120 打短缺，價格將會趨升","出現 120 打過剩，價格將會趨跌","出現 60 打短缺，價格將會趨升","市場已處於均衡，價格不會變動"],"correctIndex":0,"explanation":"市價 \\$12 時需求量為 440 打、供應量為 320 打，需求量大於供應量，短缺 = 440 − 320 = 120 打；買方之間的競爭會推高價格，直至 \\$14 時需求量與供應量同為 380 打，市場回復均衡。「出現 120 打過剩」把短缺與過剩的方向調轉——只有當市價高於均衡價格（例如 \\$16）才會出現過剩。「出現 60 打短缺」屬計算錯誤，多數源於錯誤取用相鄰行的數字（例如以 \\$12 的需求量減 \\$14 的供應量）。「市場已處於均衡」不成立，因為 \\$12 時需求量與供應量並不相等。","trapTypes":["correct","concept_reversal","calculation_slip","keyword_misread"],"dnaTag":"MEC","mother":"sd-equilibrium-table"},{"id":"econ-sd-mc-3","topic":"供需同時移動","difficulty":"intermediate","question":"政府向電動車買家提供購買資助，同一時間電池成本大幅下跌。若其他因素不變，電動車的均衡價格及均衡數量會如何變動？","options":["均衡數量必定上升；均衡價格可升可跌","均衡數量必定上升；均衡價格必定下跌","均衡數量必定上升；均衡價格必定上升","均衡價格及均衡數量的變動方向均不能確定"],"correctIndex":0,"explanation":"購買資助令需求增加（需求曲線右移），電池成本下跌令供應增加（供應曲線右移）。兩股力量都推高成交數量，故均衡數量必定上升；但需求增加會推高價格、供應增加會壓低價格，最終價格變動取決於兩者移動幅度的相對大小，故方向不能確定。「均衡價格必定下跌」與「均衡價格必定上升」各自只看到其中一條曲線的移動，忽略了另一邊的反向拉力。「均衡價格及均衡數量的變動方向均不能確定」則錯把價格的不確定性套用到數量上——數量在兩股同向力量下必定上升，是可以確定的。","trapTypes":["correct","half_right","half_right","over_interpretation"],"dnaTag":"CMT","mother":"sd-double-shift"},{"id":"econ-sd-mc-4","topic":"彈性與總收益","difficulty":"intermediate","question":"一間快餐店把招牌套餐的售價由 \\$45 減至 \\$40 後，套餐的總收益不跌反升。在該價格範圍內，套餐的需求屬於哪一種彈性？","options":["富有彈性，因為需求量增加的百分比大於價格下跌的百分比","缺乏彈性，因為價格下跌會令每份套餐的收入減少","單位彈性，因為總收益的變動與價格變動互相抵銷","不能判斷，因為總收益與需求彈性沒有關係"],"correctIndex":0,"explanation":"減價後總收益上升，表示需求量增加的百分比大於價格下跌的百分比，即需求價格彈性大於一，屬富有彈性。「缺乏彈性」的推論剛好相反——若需求缺乏彈性，減價後需求量的增幅不足以抵銷價格的跌幅，總收益應下跌而非上升。「單位彈性」意味着總收益維持不變，與題目所述「總收益不跌反升」矛盾。「總收益與需求彈性沒有關係」不成立——價格變動後總收益的變動方向，正是判斷需求彈性的常用方法。","trapTypes":["correct","concept_reversal","concept_swap","over_interpretation"],"dnaTag":"CMT","mother":"sd-elasticity-tr"},{"id":"econ-sd-mc-5","topic":"價格管制（價格上限）","difficulty":"intermediate","question":"政府為紓緩基層生活負擔，對某糧油食品實施有效的價格上限（上限低於原有均衡價格）。下列哪一項描述最可能出現的市場結果？","options":["需求量大於供應量，出現短缺，並可能衍生輪候、抽籤等非價格分配方式","供應量大於需求量，出現過剩，商戶需要減價促銷","市場價格最終會回落至新的均衡水平，短缺自動消失","成交價格下跌至上限水平後，需求量與供應量自動相等"],"correctIndex":0,"explanation":"有效的價格上限把成交價格壓在均衡價格之下：較低的價格令需求量增加、供應量減少，需求量大於供應量，形成短缺；由於價格被法例封頂，不能再擔當分配資源的角色，市場往往改以輪候、抽籤、按人限購等非價格方式分配。「出現過剩」把方向調轉——過剩是價格高於均衡水平（例如有效價格下限）的結果。「價格回落至新的均衡水平」忽略了上限的約束力：價格不得高於上限，市場無法自行調節回均衡，短缺會持續存在。「需求量與供應量自動相等」錯在成交價受限於上限後，兩個數量並不相等——實際成交量只等於較小的供應量，其餘需求無法獲得滿足。","trapTypes":["correct","concept_reversal","concept_swap","half_right"],"dnaTag":"CMT","mother":"sd-price-ceiling"},{"id":"econ-sd-mc-6","topic":"需求彈性的決定因素","difficulty":"intermediate","question":"下列哪一種物品的需求價格彈性，最可能是四者之中最高？","options":["某一品牌的樽裝蒸餾水","所有類別的飲品","食鹽","住宅用電"],"correctIndex":0,"explanation":"需求價格彈性的高低主要取決於替代品的多寡與接近程度：某一品牌的樽裝蒸餾水有大量其他品牌以至其他飲品作為緊密替代品，價格稍升消費者便會轉買其他選擇，需求量反應極大，彈性最高。「所有類別的飲品」的定義範圍極廣，範圍以外幾乎沒有緊密替代品，彈性遠低於單一品牌的產品。「食鹽」與「住宅用電」同屬開支佔收入比例小、短期內難以替代的必需品，價格變動對需求量的影響輕微，需求缺乏彈性。","trapTypes":["correct","concept_swap","concept_swap","concept_swap"],"dnaTag":"CMT","mother":"sd-elasticity-determinants"},{"id":"econ-sd-mc-7","topic":"相關物品（互補品與替代品）","difficulty":"intermediate","question":"戲院因租金上升而調高戲票價格。若其他因素不變，戲院爆谷（通常與看戲一同消費）及家中串流平台訂閱（看戲的替代選擇）的市場會受到甚麼影響？","options":["爆谷的需求減少；串流平台訂閱的需求增加","爆谷的需求增加；串流平台訂閱的需求減少","爆谷的需求量減少，但爆谷的需求不變","爆谷及串流平台訂閱的需求同時減少"],"correctIndex":0,"explanation":"戲票價格上升令看戲的需求量減少；爆谷與看戲屬互補品，入場人次下跌令爆谷的需求（整條需求曲線）減少；串流平台訂閱是看戲的替代品，部分消費者轉向在家觀影，其需求增加。「爆谷的需求增加；串流平台訂閱的需求減少」把互補品與替代品的效果方向調轉。「爆谷的需求量減少，但爆谷的需求不變」混淆了兩個概念——價格變動的是戲票而非爆谷本身，爆谷是在自身價格不變的情況下銷量下跌，屬需求（曲線）減少，而非沿曲線的需求量變動。「需求同時減少」忽略了替代關係——看戲成本上升正是串流平台訂閱吸引力上升的原因。","trapTypes":["correct","concept_reversal","concept_swap","half_right"],"dnaTag":"TMR","mother":"sd-related-goods"},{"id":"econ-sd-mc-8","topic":"從量稅與稅務負擔","difficulty":"hard","question":"某外賣飯盒市場原本的均衡價格為每盒 \\$8，均衡數量為每日 600 盒。政府向賣方徵收每盒 \\$3 從量稅後，買方支付的價格升至 \\$10，每日成交量跌至 400 盒。下列哪一項正確？","options":["政府每日稅收為 \\$1,200；買方每盒負擔 \\$2，賣方每盒負擔 \\$1","政府每日稅收為 \\$1,800；買方每盒負擔 \\$2，賣方每盒負擔 \\$1","政府每日稅收為 \\$1,200；稅款全數由賣方負擔，因為稅是向賣方徵收","政府每日稅收為 \\$1,200；買方每盒負擔 \\$1，賣方每盒負擔 \\$2"],"correctIndex":0,"explanation":"稅收 = 每盒稅款 \\$3 × 徵稅後成交量 400 盒 = \\$1,200。買方支付的價格由 \\$8 升至 \\$10，每盒負擔 \\$2；賣方收取的淨價格 = \\$10 − \\$3 = \\$7，較原先的 \\$8 少 \\$1，故每盒負擔 \\$1，兩者合計正好等於 \\$3 稅款。「稅收 \\$1,800」錯用了徵稅前的 600 盒計算——從量稅只能按實際成交量徵收，徵稅後成交量已跌至 400 盒。「稅款全數由賣方負擔」把法定繳稅人與實際負擔者混為一談：稅雖向賣方徵收，但賣方可透過提高售價把部分稅款轉嫁給買方，實際分擔比例由供需雙方的彈性決定。「買方每盒負擔 \\$1，賣方每盒負擔 \\$2」把兩者的負擔調轉，與題中的價格數據不符。","trapTypes":["correct","calculation_slip","concept_swap","concept_reversal"],"dnaTag":"MEC","mother":"sd-tax-incidence"},{"id":"econ-sd-mc-9","topic":"配額與市場效率","difficulty":"hard","question":"政府對某種入口水果實施入口配額，配額數量低於自由市場下的均衡成交量。下列哪一項正確描述配額對該市場的影響？","options":["市價上升，成交量下跌，社會總盈餘減少","市價上升，但消費者的損失全數轉化為持牌入口商的利益，社會總盈餘不變","供應受限但需求不變，市價與成交量的變動方向均不能確定","配額與有效價格上限一樣，會令市場出現持續短缺"],"correctIndex":0,"explanation":"配額把成交量限制在均衡數量以下；在既定需求下，數量減少令市價沿需求曲線上升至對應配額量的水平。成交量下跌意味着一些「買方願付價格高於賣方成本」的互利交易無法進行，這部分消失了的盈餘不會轉移給任何人，故社會總盈餘減少，出現效率損失。「消費者的損失全數轉化為持牌入口商的利益」只說中了一部分——價格上升確實令部分消費者盈餘轉移至持牌入口商，但因成交量下跌而消失的盈餘並無承接者，總盈餘仍然下跌。「變動方向均不能確定」不成立：配額既定，成交量必定下跌，價格必定上升，方向十分明確。「會令市場出現持續短缺」混淆了配額與價格上限——配額下價格可以自由上升以結清市場，在較高價格下需求量回落至配額水平，不會出現持續短缺；持續短缺是價格被壓住不能調整（價格上限）的特徵。","trapTypes":["correct","half_right","over_interpretation","concept_swap"],"dnaTag":"CMT","mother":"sd-quota-efficiency"}];

    ? ` <span style="font-size:12px;color:var(--wait);border:1px solid var(--line);border-radius:999px;padding:1px 8px;white-space:nowrap">${trapZh[d.trapTypes[oi]]||escape(d.trapTypes[oi])}</span>`
    : '';
  el.innerHTML = `<div class="meta"><span class="badge">#${i+1}</span><span class="badge">${d.id}</span><span class="badge">${d.topic}</span><span class="badge">${diffZh[d.difficulty]||d.difficulty}</span>${d.dnaTag?`<span class="badge" style="color:var(--wait)">${dnaZh[d.dnaTag]||d.dnaTag}</span>`:''}${d.mother?`<span class="badge">模板 ${escape(d.mother)}</span>`:''}</div>
  <div class="q">${escape(d.question)}</div>
  <ul>${d.options.map((o,oi)=>`<li class="${oi===d.correctIndex?'correct':''}">${escape(o)}${trapTag(oi)}</li>`).join('')}</ul>
  <div class="exp">💡 ${escape(d.explanation)}</div>
  <div class="acts"><button class="a" onclick="mark(${i},'approved')">✅ 通過</button><button class="r" onclick="mark(${i},'rejected')">❌ 退回</button><button class="p on" onclick="mark(${i},'pending')">⏳ 待定</button></div>`;
  list.appendChild(el);
});
function escape(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
let cur = 0;
function mark(i, v){ const d = DATA[i]; state[d.id] = v; const el = document.getElementById('c'+i);
  el.classList.toggle('approved', v==='approved'); el.classList.toggle('rejected', v==='rejected');
  el.querySelector('.a').classList.toggle('on', v==='approved'); el.querySelector('.r').classList.toggle('on', v==='rejected'); el.querySelector('.p').classList.toggle('on', v==='pending');
  counts(); }
function counts(){ let a=0,r=0,p=0; for(const k in state){ if(state[k]==='approved')a++; else if(state[k]==='rejected')r++; else p++; }
  document.getElementById('cA').textContent=a; document.getElementById('cR').textContent=r; document.getElementById('cP').textContent=p; }
function focusCard(i){ cur=Math.max(0,Math.min(DATA.length-1,i)); document.getElementById('c'+cur).scrollIntoView({behavior:'smooth',block:'center'}); }
document.addEventListener('keydown', e=>{ if(e.target.tagName==='INPUT')return; const k=e.key.toLowerCase();
  if(k==='j'){focusCard(cur+1);} else if(k==='k'){focusCard(cur-1);}
  else if(k==='a'){mark(cur,'approved');focusCard(cur+1);} else if(k==='r'){mark(cur,'rejected');focusCard(cur+1);} else if(k==='p'){mark(cur,'pending');} });
document.getElementById('exp').addEventListener('click', ()=>{
  const out = { _meta: { source: "econ-supply-demand-mc-10.json", subject: SUBJECT, reviewer: document.getElementById('rev').value.trim(), reviewedAt: new Date().toISOString().slice(0,10) }, decisions: state };
  const blob = new Blob([JSON.stringify(out,null,2)+'\n'], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "econ-supply-demand-mc-10.decisions.json"; a.click();
});
counts();
</script></body></html>
